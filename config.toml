[general]
simultaneous_threshold_ms = 100
toggle_hotkey = "Ctrl+Shift+F12"
layouts_dir = "layout"
default_layout = "nicola.yab"

# confirm_mode = "wait"  # wait / speculative / two_phase / adaptive_timing / ngram_predictive
# speculative_delay_ms = 30

# エンジン ON/OFF キー（複数指定可、デフォルト: 変換で ON、Ctrl+無変換で OFF）
# engine_on_keys = ["VK_CONVERT"]
# engine_off_keys = ["Ctrl+VK_NONCONVERT"]

# n-gram コーパスファイル（オプション、指定しなければ固定閾値で動作）
# ngram_file = "data/ngram_hiragana.toml"
# ngram_adjustment_range_ms = 20
# ngram_min_threshold_ms = 30
# ngram_max_threshold_ms = 120

# フォーカス判定の永続オーバーライド
# 特定の (プロセス名, クラス名) の組み合わせに対して、
# 自動判定を無視してテキスト入力 / 非テキストを強制する。
# [focus_overrides]
# force_text = [
#     { process = "chrome.exe", class = "Chrome_RenderWidgetHostHWND" },
# ]
# force_bypass = [
#     { process = "explorer.exe", class = "CabinetWClass" },
# ]

