[general]
simultaneous_threshold_ms = 100
engine_toggle_hotkey = "Ctrl+Shift+F12"
layouts_dir = "layout"
default_layout = "nicola.yab"

# confirm_mode = "wait"  # wait / speculative / two_phase / adaptive_timing / ngram_predictive
# speculative_delay_ms = 30

# n-gram コーパスファイル（実行ファイルからの相対パス）。
# 同時打鍵 3 鍵仲裁（例: 「よかった」の「か」と「ん」のどちらに右親指が
# 帰属するか）を頻度モデルで判定するために使用する。設定しない場合は
# 純粋なタイミング比較 (d1 < d2) のみで判定するため、誤判定が増える。
ngram_file = "data/ngram_hiragana.csv.gz"
# ngram_adjustment_range_ms = 20
# ngram_min_threshold_ms = 30
# ngram_max_threshold_ms = 120

# キーバインディング設定
# [keys]
# エンジン ON/OFF キー（複数指定可、デフォルト: Ctrl+Shift+変換で ON、Ctrl+Shift+無変換で OFF）
# engine_on = ["Ctrl+Shift+Convert"]
# engine_off = ["Ctrl+Shift+Nonconvert"]

# IME 検出設定（シャドウ IME 状態追跡用キー定義）
# [keys.ime_detect]
# toggle = ["VK_KANJI"]
# on = ["VK_DBE_DBCSCHAR", "VK_IME_ON"]
# off = ["VK_DBE_SBCSCHAR", "VK_IME_OFF"]

# フォーカス判定の永続オーバーライド
# 特定の (プロセス名, クラス名) の組み合わせに対して、
# 自動判定を無視してテキスト入力 / 非テキストを強制する。
# [app_overrides]
# force_text = [
#     { process = "chrome.exe", class = "Chrome_RenderWidgetHostHWND" },
# ]
# force_bypass = [
#     { process = "explorer.exe", class = "CabinetWClass" },
# ]

# ローマ字出力を VK キーストローク経由で送るアプリの明示指定。
# Chrome/Edge/Electron 等 IME composition を VK 経由でないと扱えないアプリ向け。
# Win32 モード（Unicode 直接注入）がデフォルトで動作する。
#
# force_tsf: VK Sequential モード（WezTerm 等 TSF 直結アプリ）
#   IME composition + 漢字変換を有効にする。NICOLA フックはスルーして
#   WezTerm の TSF に通常のキーストロークとして届ける。
[app_overrides]
force_tsf = [
    { process = "wezterm-gui.exe", class = "org.wezfurlong.wezterm" },
]
# force_vk = [
#     { process = "chrome.exe", class = "Chrome_WidgetWin_1" },
# ]

# Ctrl+key バイパス直後に次キーを NICOLA スキップするルール。
# tmux の prefix (Ctrl+J) → コマンドキー (n/p) のように、
# prefix キーの直後に来るコマンドキーが NICOLA に横取りされる場合に設定する。
# key: バイパストリガー（Ctrl+key 形式で指定）
# process: プロセス名フィルタ（省略=全アプリ、部分一致、大文字小文字無視）
# class: ウィンドウクラスフィルタ（省略=全クラス、部分一致）
#
# [[post_bypass]]
# key = "Ctrl+J"
# process = "WindowsTerminal"   # wt.exe
