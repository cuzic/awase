# awase 設定ファイル (config.toml)
#
# このファイルを config.toml にコピーして編集してください。
# 設定されていない項目はデフォルト値が使用されます。
#
# ── 注意事項 ──
#
# ■ Unicode モード推奨
#   Windows 10 20H1 以降の新 Microsoft IME では、per_key / batched モードで
#   入力が正しく処理されない場合があります。unicode モード（デフォルト）を推奨します。
#   問題が発生する場合は Windows 設定 → 時刻と言語 → 言語と地域 →
#   日本語 → オプション → 「旧バージョンの Microsoft IME を使う」も有効です。
#
# ■ Windows 11 での自動起動
#   スタートアップフォルダからの起動が失敗する場合があります。
#   代替方法:
#     - タスクスケジューラ: 「ログオン時」トリガーでタスクを作成
#     - レジストリ Run キー: HKCU\Software\Microsoft\Windows\CurrentVersion\Run に追加
#
# ■ スタートメニュー / 検索バーでの入力問題
#   スタートメニューや Windows 検索バーで文字入力がおかしくなる場合は、
#   下記 [focus_overrides] の force_bypass にウィンドウクラスを追加してください。
#   一般的なクラス名:
#     - Windows.UI.Core.CoreWindow  (スタートメニュー, 検索)
#     - SearchHost                  (Windows 11 検索)

[general]
# 同時打鍵の判定閾値（ミリ秒）。NICOLA 規格標準は 100ms。
# 値を小さくすると高速打鍵に追従するが、同時打鍵の認識率が下がる。
simultaneous_threshold_ms = 100

# 左親指キー（VK コード名）
left_thumb_key = "VK_NONCONVERT"    # 無変換キー

# 右親指キー（VK コード名）
right_thumb_key = "VK_CONVERT"       # 変換キー

# 配列定義ファイルの格納ディレクトリ
layouts_dir = "config"

# デフォルトの .yab レイアウトファイル名
default_layout = "nicola.yab"

# 確定モード
#   wait             - タイムアウトまで出力を保留（最も正確）
#   speculative      - 即座に出力、同時打鍵時に BS で差し替え（最も高速）
#   two_phase        - 短い待機→投機出力→差し替え（バランス型）
#   adaptive_timing  - 連続打鍵中は待機、途切れたら投機
#   ngram_predictive - n-gram 予測で投機/待機を動的切替
confirm_mode = "wait"

# 投機出力までの待機時間（ミリ秒、two_phase/adaptive_timing で使用）
speculative_delay_ms = 30

# ローマ字出力の送信方式
#   unicode  - ひらがなを直接送信（IME 不要、推奨）
#   per_key  - 1文字ずつ SendInput（他のフックとの互換性重視）
#   batched  - 全文字を1回の SendInput（高速）
output_mode = "unicode"

# エンジン ON キー（NICOLA 入力を有効にするキー）
engine_on_keys = ["Ctrl+Shift+VK_CONVERT"]

# エンジン OFF キー（NICOLA 入力を無効にするキー）
engine_off_keys = ["Ctrl+Shift+VK_NONCONVERT"]

# IME ON キー（ImmSetOpenStatus API で IME を ON にするキー）
# Google 日本語入力、MS-IME 対応。エンジンは IME 状態に自動追随する。
ime_on_keys = ["Ctrl+VK_CONVERT"]

# IME OFF キー（ImmSetOpenStatus API で IME を OFF にするキー）
ime_off_keys = ["Ctrl+VK_NONCONVERT"]

# フォーカス遷移デバウンス時間（ミリ秒）
# Alt-Tab 等でフォーカスが連続変更される際に IME 状態の誤検知を防ぐ。
# focus_debounce_ms = 50

# IME 状態ポーリング間隔（ミリ秒）
# マウスでの言語バー操作等、イベント駆動で検出できない変更を補完する。
# ime_poll_interval_ms = 500

# n-gram コーパスファイル（.toml, .csv, .csv.gz に対応）
# ngram_file = "data/ngram_hiragana.csv.gz"

# n-gram 閾値調整幅（ミリ秒）
# ngram_adjustment_range_ms = 20

# n-gram 適応閾値の下限/上限（ミリ秒）
# ngram_min_threshold_ms = 30
# ngram_max_threshold_ms = 120

# ── IME 同期設定 ──
# Shadow IME 状態を追跡するためのキー設定。
# awase は独自に IME ON/OFF を追跡し、IME が OFF の時はエンジンをスキップする。
# 通常は自動検出で十分だが、特殊なキーボードでは手動設定が必要な場合がある。
[ime_sync]
# toggle = ["VK_KANJI"]           # 半角/全角トグル
# on = ["VK_DBE_HIRAGANA"]        # IME ON キー
# off = ["VK_DBE_SBCSCHAR"]       # IME OFF キー

# ── フォーカスオーバーライド ──
# 自動判定を無視してテキスト入力 / 非テキストを強制する。
# process: 実行ファイル名（大文字小文字区別なし）
# class: ウィンドウクラス名（大文字小文字区別なし）
[focus_overrides]
# force_text = [
#     { process = "chrome.exe", class = "Chrome_RenderWidgetHostHWND" },
# ]
# force_bypass = [
#     { process = "PowerToys.PowerLauncher.exe", class = "InputSiteWindowClass" },
#     { process = "SearchHost.exe", class = "SearchHost" },                          # Windows 11 検索
#     { process = "SearchUI.exe", class = "Windows.UI.Core.CoreWindow" },            # Windows 10 検索
#     { process = "StartMenuExperienceHost.exe", class = "Windows.UI.Core.CoreWindow" }, # スタートメニュー
# ]

# ── ローマ字出力方式のオーバーライド ──
# force_vk: ローマ字を VK キーストローク経由で送る (IME composition 必須のアプリ用)
# IMM query は通るが composition は独自 TSF text store というハイブリッド系
# (wezterm 等) を VK 側へ倒すときに使用。
force_vk = [
    # wezterm: IMM query は通るが composition は独自 TSF text store のため VK 必須
    { process = "wezterm-gui.exe", class = "org.wezfurlong.wezterm" },
]
