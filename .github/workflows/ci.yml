name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --lib

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --lib -- -A clippy::cargo_common_metadata -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build awase.exe
        run: cargo build --release

      - name: Build awase-settings.exe
        run: cargo build --release --features gui --bin awase-settings

      - name: Install Japanese IME
        shell: pwsh
        run: |
          $langList = New-WinUserLanguageList ja-JP
          $langList.Add("en-US")
          Set-WinUserLanguageList $langList -Force
          Write-Host "Language list set: ja-JP, en-US"

      - name: Run E2E tests
        run: cargo test --test e2e_windows -- --nocapture
        env:
          RUST_LOG: debug

      - name: Prepare distribution
        shell: bash
        run: |
          mkdir -p dist/layout
          cp target/release/awase.exe dist/
          cp target/release/awase-settings.exe dist/
          cp config.toml dist/
          cp layout/*.yab dist/layout/
          cp README.md dist/
          for f in LICENSE*; do [ -e "$f" ] && cp "$f" dist/; done

      - name: Upload distribution
        uses: actions/upload-artifact@v4
        with:
          name: awase-windows-x64
          path: dist/
