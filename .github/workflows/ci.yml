name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --lib

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --lib -- -A clippy::cargo_common_metadata -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check

  windows-build:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            name: windows-x64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build awase.exe
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build awase-settings.exe
        run: cargo build --release --target ${{ matrix.target }} --features gui --bin awase-settings

      - name: Prepare distribution
        shell: bash
        run: |
          mkdir -p dist/layout
          cp target/${{ matrix.target }}/release/awase.exe dist/
          cp target/${{ matrix.target }}/release/awase-settings.exe dist/ || true
          cp config.toml dist/
          cp layout/*.yab dist/layout/
          cp README.md dist/
          cp LICENSE* dist/ 2>/dev/null || true

      - name: Upload distribution
        uses: actions/upload-artifact@v4
        with:
          name: awase-${{ matrix.name }}
          path: dist/
