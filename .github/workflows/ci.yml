name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --lib
      # awase-windows は Windows 専用コードだが、state/ 層のユニットテストと
      # architecture_guard / golden_scenarios / layer_boundary_guard は
      # ソースをテキスト走査する第二防衛線でプラットフォーム非依存なため Linux でも走る。
      # ime_key_sequence_golden は #![cfg(windows)] なので Linux では 0 tests。
      # 実際の assert は windows-build ジョブで実行する。
      - run: cargo test --lib -p awase-windows
      - run: cargo test -p awase-windows --test architecture_guard --test golden_scenarios --test layer_boundary_guard

  windows-cross-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get install -y gcc-mingw-w64-x86-64
      # Windows GNU ターゲット向けにテストバイナリをビルド（実行はしない）。
      # Linux では検出できない Windows 固有の型エラー・API 不一致をローカル CI で早期発見する。
      # -D warnings で warning も CI エラーとして扱い、混入を防ぐ。
      - run: RUSTFLAGS="-D warnings" cargo test --target x86_64-pc-windows-gnu --no-run -p awase-windows

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --lib -- -A clippy::cargo_common_metadata -D warnings -W clippy::cognitive_complexity

  dylint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # カスタム dylint lint (no_vk_as_scan / ime_event_guard / observation_source_guard)
      # はレイヤー境界を機械的に強制する。
      # rustc_private を使うため nightly + rustc-dev/llvm-tools-preview が必須。
      # toolchain は lints/*/rust-toolchain に固定された値と一致させること（勝手に上げない）。
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-22
          components: rustc-dev, llvm-tools-preview
          targets: x86_64-pc-windows-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-dylint
        run: cargo install cargo-dylint dylint-link --version 6.0.0 --locked
      # awase-windows を Windows ターゲットで check し、journal.rs 等の #[cfg(windows)]
      # コードも含めて lint する（windows-cross-check ジョブと同じ cross-compile 方針）。
      # 両 lint は Warn レベルなので DYLINT_RUSTFLAGS=-D warnings で CI エラーへ昇格させる。
      - name: Run dylint (custom layer-boundary lints)
        env:
          DYLINT_RUSTFLAGS: "-D warnings"
        run: cargo dylint --all -p awase-windows -- --target x86_64-pc-windows-gnu

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Clippy (awase-windows)
        run: cargo clippy -p awase-windows -- -A clippy::cargo_common_metadata -D warnings -W clippy::cognitive_complexity

      - name: Build awase.exe
        run: cargo build --release -p awase-windows

      - name: Build awase-settings.exe
        run: cargo build --release -p awase-settings

      # awase-settings は今まで実 Windows でテストが一度も走っていなかった
      # （build のみで test 未実行）。egui::Grid が行内 add_space() で panic する
      # 不具合（プレビュータブを開くと無言のまま強制終了）が Linux 上の headless
      # 再現テストでは検出できても実 Windows で再現するかは未検証だったため追加。
      - name: Run awase-settings tests (Windows)
        run: cargo test -p awase-settings

      - name: Install Japanese IME
        shell: pwsh
        run: |
          $langList = New-WinUserLanguageList ja-JP
          $langList.Add("en-US")
          Set-WinUserLanguageList $langList -Force
          Write-Host "Language list set: ja-JP, en-US"

      # ime_key_sequence_golden は #![cfg(windows)] のため Linux の test ジョブでは
      # 0 tests になり、実質どこでも走っていなかった。ここ（実 Windows）で初めて
      # 戦略選択のゴールデンを assert する。architecture_guard/golden_scenarios/
      # layer_boundary_guard も Windows ターゲットで再実行し、#[cfg] ドリフトを検知する。
      # これらは決定的（環境非依存）なのでブロック化する（continue-on-error なし）。
      - name: Run golden / architecture guard tests (Windows)
        run: cargo test -p awase-windows --test architecture_guard --test golden_scenarios --test layer_boundary_guard --test ime_key_sequence_golden

      # E2E の決定的テスト（純 Engine の in-process ロジック + SendMessage/WM_CHAR）は
      # フォアグラウンドフォーカス非依存で、実 HWND 生成に失敗しても early-return で
      # skip するため spurious failure を起こさない。よってブロック化する。
      # 旧ステップは `-p` 欠落で "no test target" エラーになっていたが continue-on-error
      # で握り潰されており、E2E は CI で一度も実行されていなかった（-p awase-windows で修正）。
      - name: Run E2E tests (deterministic — blocks CI on failure)
        run: cargo test -p awase-windows --test e2e_windows -- --nocapture --skip e2e_sendinput --skip e2e_ime_status_detection
        env:
          RUST_LOG: debug

      # SendInput 系（e2e_sendinput_interactive / e2e_sendinput_special_keys_interactive）と
      # 実 IME 依存（e2e_ime_status_detection）はフォアグラウンドフォーカスや実 IME の
      # 生成タイミングに依存する非決定的テスト。CI (GITHUB_ACTIONS) では
      # is_interactive_session() が false を返して early-return で skip されるが、
      # 将来ローカル/セルフホストで有効化された際の timing race を CI 赤化に波及させない
      # よう continue-on-error を維持する。
      - name: Run E2E interactive tests (non-deterministic — informational only)
        continue-on-error: true
        run: cargo test -p awase-windows --test e2e_windows -- --nocapture e2e_sendinput e2e_ime_status_detection
        env:
          RUST_LOG: debug

      - name: Prepare distribution
        shell: bash
        run: |
          mkdir -p dist/layout dist/data dist/scripts
          cp target/release/awase.exe dist/
          cp target/release/awase-settings.exe dist/
          cp config.toml dist/
          cp layout/*.yab dist/layout/
          cp data/*.csv.gz dist/data/ 2>/dev/null || true
          cp data/*.toml dist/data/ 2>/dev/null || true
          cp scripts/run-e2e.ps1 dist/scripts/
          cp scripts/install.ps1 dist/
          cp scripts/uninstall.ps1 dist/
          cp README.md dist/
          for f in LICENSE*; do [ -e "$f" ] && cp "$f" dist/; done

      - name: Upload distribution
        uses: actions/upload-artifact@v4
        with:
          name: awase-windows-x64
          path: dist/

      - name: Create ZIP archive
        shell: pwsh
        run: |
          Compress-Archive -Path dist/* -DestinationPath awase-windows-x64.zip

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: awase-windows-x64-zip
          path: awase-windows-x64.zip

      - name: Install WiX Toolset
        run: choco install wixtoolset -y --no-progress

      - name: Build MSI
        shell: cmd
        run: |
          set PATH=%PATH%;C:\Program Files (x86)\WiX Toolset v3.14\bin
          candle.exe wix\main.wxs -dVersion=0.1.0 -out wix\main.wixobj
          light.exe wix\main.wixobj -out awase-0.1.0-x64.msi -ext WixUIExtension

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: awase-windows-x64-msi
          path: awase-0.1.0-x64.msi
