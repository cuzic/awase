# cargo-mutants 設定 (https://mutants.rs/)
#
# デフォルト対象はワークスペースルートの `awase` パッケージ（プラットフォーム
# 非依存の中核ロジック: engine/ gate.rs kana_table.rs ngram.rs scanmap.rs yab/ 等）。
# ルート Cargo.toml は [workspace] と [package] を兼ねているため、リポジトリ
# ルートで引数なしに `cargo mutants` を実行すると `awase` パッケージだけが対象になる。
#
# 他パッケージを対象にする場合は明示的に指定する:
#   cargo mutants -p awase-windows   # state/ 等の一部はプラットフォーム非依存だが、
#                                     # 大半は #[cfg(windows)] のため Linux 上では
#                                     # unviable 判定（ビルド対象外）になる。
#                                     # 本命は Windows 実機 / windows-latest CI。
#   cargo mutants --workspace        # 全パッケージ（低速）
#
# 変更点だけを見たいときは --in-diff を使う:
#   git diff main | cargo mutants --in-diff -

exclude_globs = [
    "target/**",
    # ゴールデン/ジャーナルの固定データフィクスチャ（ロジックを持たない）
    "crates/awase-windows/tests/golden/**",
    "crates/awase-windows/tests/journals/**",
]

# ビルドが数十秒かかることがあるため、自動タイムアウト推定が短すぎて
# false MISSED（実際はテストが間に合わず打ち切られただけ）になるのを防ぐ下限。
minimum_test_timeout = 30

# 初回フル実行（2026-07-24、GitHub Actions run 30070606789、661 mutants）で
# 見つかった MISSED 127件のうち、以下19件はログ/デバッグ出力にのみ影響し、
# 製品ロジックとしての価値がない（テストで潰すコストに見合わない）ため除外する:
#
# - debug_label / debug_state_label 系（EngineState/Engine/FsmAdapter/NicolaFsm）:
#   デバッグ用の状態ラベル文字列生成。ログにしか出ず、動作に影響しない。
# - UpperHex/LowerHex (VkCode/ScanCode) の fmt 実装: ログ表示専用。
# - Debug for YabFace / Display for Charset / Display for ConvMode の fmt 実装:
#   同上、表示専用でロジックに影響しない。
#
# これにより以後の実行結果は実ロジックの検証に集中できる。
exclude_re = [
    "debug_label|debug_state_label",
    "UpperHex|LowerHex",
    "impl std::fmt::Debug for YabFace",
    "impl fmt::Display for Charset",
    "impl fmt::Display for ConvMode",

    # 等価変異体（equivalent mutant）: TimingJudge::three_key_pairing の
    # `if score_a > score_b` (src/engine/timing.rs:120) は、直前の
    # `if (score_a - score_b).abs() > f32::EPSILON` ガードを通過した時点で
    # score_a != score_b が保証されている。score_a != score_b の前提下では
    # `>` と `>=` は常に同じ真偽値を返すため、`>=` へのこの変異はどんな入力でも
    # 区別不可能（数学的に等価）。同じ箇所の `==`/`<` への変異は区別可能で
    # 別途テスト済み（この行を除外対象から漏らさないよう line:col まで指定する）。
    "timing\\.rs:120:24: replace > with >=",

    # ログ出力のみに影響し、戻り値・状態に一切影響しない分岐:
    # NicolaFsm::flush_pending の `if !was_idle { log::info!(...) }` は、
    # was_idle の真偽が変わってもログを出すかどうかが変わるだけで、
    # 返す Response や self.state には影響しない。
    "nicola_fsm\\.rs:299:12: delete ! in NicolaFsm::flush_pending",
]
